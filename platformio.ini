; BR_bootloader -- PlatformIO + Arduino framework bootloader for BR boards
;
; Phase 1+2: MicroNode (STM32L431, bxCAN, 256 KB flash, 40 KB bootloader region).
; Phase 3:   MicroNodePlus (STM32H723, FDCAN, 1024 KB) and CoreNode (STM32H743,
;            FDCAN, 2048 KB) -- both share the same H7 linker (128 KB sector-0
;            bootloader region at 0x08000000, app at 0x08020000).
;
; Boards + variants are sourced from br_platformio_hwdef, same as Arduino-DroneCAN.

[platformio]
default_envs = MicroNode-Bootloader
boards_dir = ${platformio.packages_dir}/br-boards/boards

[env]
platform_packages = br-boards @ git+https://github.com/BeyondRobotix/br_platformio_hwdef.git
board_build.variants_dir = ${platformio.packages_dir}/br-boards/variants
upload_protocol = stlink
debug_tool = stlink
debug_build_flags = -O0 -g
debug_init_break = tbreak none

; Flags shared by every bootloader build. Size-optimised, GC unused sections.
[bootloader_common]
build_flags =
    -Os
    -ffunction-sections
    -fdata-sections
    -Wl,--gc-sections
    -Wno-error=deprecated-declarations

; --- MicroNode (STM32L431, bxCAN) ------------------------------------------
[env:MicroNode-Bootloader]
platform = ststm32
board = MicroNode
framework = arduino
board_build.ldscript = linker/bootloader_l4.ld
build_flags =
    ${bootloader_common.build_flags}
    -DCANL431
    -DBOARD_FLASH_SIZE=256

; --- MicroNodePlus (STM32H723, FDCAN) --------------------------------------
[env:MicroNodePlus-Bootloader]
platform = ststm32
board = MicroNodePlus
framework = arduino
board_build.ldscript = linker/bootloader_h7.ld
build_flags =
    ${bootloader_common.build_flags}
    -DARDUINO_GENERIC_H723ZGTX
    -DARDUINO_NUCLEO_H723ZG
    -DACANFD
    -DBOARD_FLASH_SIZE=1024

; --- CoreNode (STM32H743, FDCAN) -------------------------------------------
[env:CoreNode-Bootloader]
platform = ststm32
board = CoreNode
framework = arduino
board_build.ldscript = linker/bootloader_h7.ld
build_flags =
    ${bootloader_common.build_flags}
    -DCANH7
    -DARDUINO_NUCLEO_H743ZI2
    -DACANFD
    -DBOARD_FLASH_SIZE=2048
