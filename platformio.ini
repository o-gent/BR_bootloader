; BR_bootloader -- PlatformIO + Arduino framework bootloader for BR boards.
;
; Phase 1+2: MicroNode (STM32L431, bxCAN, 256 KB flash, 40 KB bootloader region).
; Phase 3:   MicroNodePlus (STM32H723, FDCAN, 1024 KB) and CoreNode (STM32H743,
;            FDCAN, 2048 KB) -- both share the same H7 linker (128 KB sector-0
;            bootloader region at 0x08000000, app at 0x08020000).
;
; Boards + variants are sourced from the br-stm32 platform in br_platformio_hwdef.

[platformio]
default_envs = Micro-Node-Bootloader

[env]
platform = https://github.com/BeyondRobotix/br_platformio_hwdef.git
framework = arduino
upload_protocol = stlink
debug_tool = stlink
debug_build_flags = -O0 -g
debug_init_break = tbreak none
lib_deps = https://github.com/BeyondRobotix/libArduinoDroneCAN.git#v1.0.0

; Flags shared by every bootloader build. Size-optimised, GC unused sections.
[bootloader_common]
build_flags =
    -Os
    -ffunction-sections
    -fdata-sections
    -Wl,--gc-sections
    -Wno-error=deprecated-declarations

[env:Micro-Node-Bootloader]
board = MicroNode
board_build.ldscript = linker/bootloader_l4.ld
build_flags = ${bootloader_common.build_flags}

[env:Micro-Node-Plus-App]
board = MicroNodePlus
board_build.ldscript = linker/bootloader_h7.ld
build_flags = ${bootloader_common.build_flags}

[env:Core-Node-Bootloader]
board = CoreNode
board_build.ldscript = linker/bootloader_h7.ld
build_flags = ${bootloader_common.build_flags}
